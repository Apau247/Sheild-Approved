name: Defang
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: Whether to deploy up or down
        required: true
        default: up
        type: choice
        options:
          - up
          - down
      stack:
        description: The stack to deploy up or down. (Leave blank for default)
        default: market
jobs:
  defang:
    name: Defang ${{ github.event.inputs.action || 'up' }} ${{ github.event.inputs.stack || 'market' }}
    runs-on: ubuntu-latest
    timeout-minutes: 70
    permissions:
      contents: read
      id-token: write
    concurrency:
      cancel-in-progress: false
      group: deploy-Sheild-Approved1-${{ github.event.inputs.stack || 'market' }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Defang ${{ github.event.inputs.action || 'up' }} ${{ github.event.inputs.stack || 'market' }}
        uses: DefangLabs/defang-github-action@v2
        with:
          command: ${{ github.event.inputs.action || 'up' }}
          project: Sheild-Approved1
          stack: ${{ github.event.inputs.stack || 'market' }}
          compose-file: compose.yaml
      - name: Deployment Summary
        uses: DefangLabs/defang-github-action@v2
        with:
          command: services
          project: Sheild-Approved1
          stack: ${{ github.event.inputs.stack || 'market' }}
          compose-file: compose.yaml
    environment: defang-market
