<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search | Iron Vault Security</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/__colors_default.css">
    <link rel="stylesheet" href="css/__colors_dark.css">
    <link rel="stylesheet" href="css/__custom.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="scheme_default">
    <header class="site-header"><div class="main-nav"><div class="container"><a href="index.html" class="logo"><img src="images/logo.png" alt="Iron Vault Security" width="258" height="57"></a></div></div></header>
    <section class="inner-page-hero">
        <div class="container">
            <h1>Site Search</h1>
            <p id="searchIntro">Use the results below to jump directly to the right page.</p>
        </div>
    </section>
    <section class="page-section">
        <div class="container">
            <div class="table-panel">
                <h3>Search Results</h3>
                <div id="searchResults" class="mini-list"></div>
            </div>
        </div>
    </section>
    <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const query = (params.get('s') || '').toLowerCase().trim();
      const results = document.getElementById('searchResults');
      const intro = document.getElementById('searchIntro');
      const pages = [
        { title: 'New User Sign Up', href: 'signup.html', text: 'new user signup client onboarding account create register' },
        { title: 'Client Portal', href: 'client-portal.html', text: 'client portal assets tracking cargo dashboard' },
        { title: 'Admin Dashboard', href: 'admin-dashboard.html', text: 'admin operations dashboard logs inventory signups' },
        { title: 'Services', href: 'services.html', text: 'services vaulting jewellery metals' },
        { title: 'About', href: 'about.html', text: 'about company secure vault' },
        { title: 'Request Access', href: 'request-access.html', text: 'contact request access storage consultation' },
        { title: 'Login', href: 'login.html', text: 'login secure vault client admin' }
      ];
      if (!query) {
        intro.textContent = 'No search term was provided.';
        results.innerHTML = '<p class="empty-copy">Try searching for admin, client, tracking, services, or signup.</p>';
        return;
      }
      intro.textContent = 'Results for "' + query + '".';
      const matches = pages.filter(function (page) { return page.text.indexOf(query) >= 0 || page.title.toLowerCase().indexOf(query) >= 0; });
      results.innerHTML = matches.length ? matches.map(function (page) {
        return '<p><a href="' + page.href + '">' + page.title + '</a></p>';
      }).join('') : '<p class="empty-copy">No exact results. Try client, admin, signup, or services.</p>';
    })();
    </script>
</body>
</html>
