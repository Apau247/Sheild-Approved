<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Iron Vault Security</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/__colors_default.css">
    <link rel="stylesheet" href="css/__colors_dark.css">
    <link rel="stylesheet" href="css/__custom.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="scheme_dark">
    <header class="site-header">
        <div class="top-bar">
            <div class="container">
                <div class="top-bar-left"><span>Secure login for client and admin users</span></div>
                <div class="top-bar-right">
                    <a href="signup.html" class="btn-request-access">Sign Up</a>
                    <a href="request-access.html" class="btn-secure-vault">Request Access</a>
                </div>
            </div>
        </div>
        <div class="main-nav" id="mainNav">
            <div class="container">
                <a href="index.html" class="logo"><img src="images/logo.png" alt="Iron Vault Security" width="258" height="57"></a>
                <div class="nav-actions">
                    <button class="search-toggle" aria-label="Open search">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>




                    
                    <button class="menu-toggle" aria-label="Open menu" id="menuToggle">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu-overlay" id="mobileMenu">
        <div class="mobile-menu-content">
            <button class="menu-close" aria-label="Close menu" id="menuClose">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <a href="index.html" class="mobile-logo">
                <img src="images/logo.png" alt="Iron Vault Security" width="230" height="51">
            </a>
            <nav class="mobile-nav">
                <a href="signup.html">Sign Up</a>
                <a href="login.html">Login</a>
                <a href="about.html">About Us</a>
                <a href="services.html">Services</a>
                <a href="client-portal.html#tracking">Tracking</a>
                <a href="request-access.html">Contact Us</a>
            </nav>
            <form class="mobile-search" action="search.html" method="get">
                <input type="text" name="s" placeholder="Search..." aria-label="Search">
                <button type="submit">Search</button>
            </form>
        </div>
    </div>

    <!-- Search Overlay -->
    <div class="search-overlay" id="searchOverlay">
        <button class="search-close" aria-label="Close search" id="searchClose">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
        <form class="search-form" action="search.html" method="get">
            <input type="text" name="s" placeholder="Type to search..." aria-label="Search">
        </form>
    </div>

    <section class="auth-section">
        <div class="auth-bg" style="background-image: url('images/hero5.jpg');"></div>
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <img src="images/logo.png" alt="Iron Vault Security" width="180" height="40">
                </div>
                <h1>Secure Vault Access</h1>
                <p class="auth-subtitle">Use your email and password to access the client or admin portal.</p>

                <div id="loginMessage" class="dashboard-message" aria-live="polite"></div>

                <form id="loginForm" class="auth-form" novalidate>
                    <div class="form-field">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="auth-input" placeholder="Enter your email" required autocomplete="email" aria-label="Email Address">
                    </div>

                    <div class="form-field">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="auth-input" placeholder="Enter your password" required autocomplete="current-password" aria-label="Password">
                    </div>

                    <div class="form-field auth-options">
                        <label class="checkbox-field remember-field">
                            <input type="checkbox" name="remember" id="remember">
                            <span>Remember this device</span>
                        </label>
                        <a href="forgot-password.html" class="auth-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-submit btn-full">Access Vault</button>
                </form>

                <div class="auth-footer">
                    <p>Need an account? <a href="signup.html" class="auth-link">Create one here</a></p>
                </div>
            </div>
        </div>
    </section>

    <script>
    (function () {
      const form = document.getElementById('loginForm');
      const message = document.getElementById('loginMessage');
      const existingUser = localStorage.getItem('ivsCurrentUser');

      async function safeJson(response) {
        const text = await response.text();
        if (!text) {
          return {};
        }
        try {
          return JSON.parse(text);
        } catch (error) {
          throw new Error('The server returned an invalid response.');
        }
      }

      if (existingUser) {
        try {
          const parsed = JSON.parse(existingUser);
          if (parsed && parsed.role === 'admin') {
            window.location.href = 'admin-dashboard.html';
            return;
          }
          if (parsed) {
            window.location.href = 'client-portal.html';
            return;
          }
        } catch (error) {}
      }

      if (!form) return;

      form.addEventListener('submit', async function (event) {
        event.preventDefault();
        const formData = new FormData(form);
        const payload = Object.fromEntries(formData.entries());

        try {
          const response = await fetch('/api/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'login', payload: payload })
          });
          const result = await safeJson(response);
          if (!response.ok) throw new Error(result.error || 'Login failed');

          localStorage.setItem('ivsCurrentUser', JSON.stringify(result.user));
          message.textContent = 'Login successful. Redirecting.';
          message.className = 'dashboard-message active success';
          setTimeout(function () {
            window.location.href = result.redirectTo || 'client-portal.html';
          }, 700);
        } catch (error) {
          message.textContent = error.message || 'Login failed.';
          message.className = 'dashboard-message active error';
        }
      });
    })();
    </script>
    <script src="js/nav.js"></script>
</body>
</html>
